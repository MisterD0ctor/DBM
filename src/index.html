<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Death By MPV</title>
        <script type="module" src="/main.js" defer></script>
    </head>

    <body>
        <div id="player">
            <div id="playback-overlay">
                <div id="playback-status">
                    <img
                        id="playback-status-icon"
                        src="assets/icons/pause.svg"
                        alt="Playback status"
                    />
                </div>
            </div>

            <div id="video-surface"></div>

            <div id="controls-panel">
                <div id="timeline">
                    <span class="time-display" id="time-current">00:00</span>
                    <div id="seek-track">
                        <div class="time-display hidden" id="seek-tooltip">
                            <span class="time-display">00:00</span>
                        </div>
                        <div class="seek-rail">
                            <div class="seek-highlight hidden"></div>
                        </div>
                        <div class="seek-fill">
                            <div class="seek-highlight hidden"></div>
                        </div>
                        <div class="seek-thumb">
                            <div class="seek-highlight hidden"></div>
                        </div>
                    </div>
                    <span class="time-display" id="time-total">00:00</span>
                </div>

                <div class="toolbar">
                    <div class="toolbar-start">
                        <button id="btn-open">
                            <img
                                src="assets/icons/normal-straight/folder-open.svg"
                                alt="Open path"
                            />
                            <div class="media-title">
                                <span class="title"></span>
                                <span class="show"></span>
                                <span class="episode"></span>
                                <span class="episode-title"></span>
                            </div>
                        </button>
                    </div>

                    <div class="toolbar-center">
                        <button id="btn-previous">
                            <img
                                src="assets/icons/normal-straight/step-backward.svg"
                                alt="Previous"
                            />
                        </button>
                        <button class="btn-seek" id="btn-seek-back">
                            <img
                                src="assets/icons/normal-straight/seek-backward.svg"
                                alt="Skip Backward"
                            />
                        </button>
                        <button id="btn-play">
                            <img src="assets/icons/play.svg" alt="Skip Backward" />
                            <!-- <div class="play-icon">
                                <span class="play-icon-half play-icon-left"></span>
                                <span class="play-icon-half play-icon-right"></span>
                            </div> -->
                        </button>
                        <button class="btn-seek" id="btn-seek-forward">
                            <img
                                src="assets/icons/normal-straight/seek-forward.svg"
                                alt="Skip Forward"
                            />
                        </button>
                        <button id="btn-next">
                            <img src="assets/icons/normal-straight/step-forward.svg" alt="Next" />
                        </button>
                    </div>

                    <div class="toolbar-end">
                        <button id="btn-ambient">
                            <img src="assets/icons/normal-straight/bulb.svg" alt="Ambient" />
                        </button>
                        <button class="playlist-anchor" id="btn-playlist">
                            <img src="assets/icons/normal-straight/playlist.svg" alt="Playlist" />
                        </button>
                        <button class="tracks-anchor" id="btn-tracks">
                            <img src="assets/icons/normal-straight/subtitles.svg" alt="Subtitles" />
                        </button>
                        <div class="volume-group">
                            <div class="btn-wrap">
                                <input
                                    id="volume-slider"
                                    type="range"
                                    min="0"
                                    max="200"
                                    value="100"
                                    step="2"
                                />
                                <div id="volume-display-wrap">
                                    <span id="volume-display">100</span>
                                </div>
                                <button id="btn-mute">
                                    <img src="assets/icons/normal-straight/volume.svg" alt="Mute" />
                                </button>
                            </div>
                        </div>
                        <button id="btn-panscan">
                            <img
                                src="assets/icons/normal-straight/expand-arrows-alt.svg"
                                alt="Pan-Scan"
                            />
                        </button>
                        <button id="btn-fullscreen">
                            <img src="assets/icons/normal-straight/expand.svg" alt="Fullscreen" />
                        </button>
                    </div>
                </div>
                <div id="playlist-menu" class="menu hidden">
                    <div id="playlist-items"></div>
                </div>
                <div id="tracks-menu" class="menu hidden">
                    <div class="tracks-heading">
                        <span>Subtitles</span>
                        <img src="assets/icons/bold-straight/subtitles.svg" alt="Subtitles" />
                    </div>
                    <div id="tracks-subtitle" class="tracks-list"></div>
                    <div class="tracks-divider"></div>
                    <div class="tracks-heading">
                        <span>Audio</span>
                        <img src="assets/icons/bold-straight/volume.svg" alt="Audio" />
                    </div>
                    <div id="tracks-audio" class="tracks-list"></div>
                </div>
            </div>
        </div>
    </body>
</html>
