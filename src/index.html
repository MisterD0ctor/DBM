<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Death By MPV</title>
        <script type="module" src="/main.js" defer></script>
    </head>

    <body>
        <div id="player">
            <div id="playback-overlay">
                <div id="playback-status">
                    <img
                        id="playback-status-icon"
                        src="assets/icons/pause.svg"
                        alt="Playback status"
                    />
                </div>
            </div>

            <div id="video-surface"></div>

            <div id="controls-panel">
                <div id="open-buttons"></div>

                <div id="timeline">
                    <span class="time-display" id="time-current">00:00</span>
                    <div id="seek-track">
                        <div id="seek-anchor"></div>
                        <div class="preview-clip hidden no-preview" id="seek-preview">
                            <img id="seek-preview-image" src="" alt="Seek preview" />
                        </div>
                        <div class="tooltip hidden" id="seek-tooltip">
                            <span class="tooltip-text">00:00</span>
                        </div>
                        <div class="seek-rail">
                            <div class="seek-highlight hidden"></div>
                        </div>
                        <div class="seek-fill">
                            <div class="seek-highlight hidden"></div>
                        </div>
                        <div class="seek-thumb">
                            <div class="seek-highlight hidden"></div>
                        </div>
                    </div>
                    <span class="time-display" id="time-total">00:00</span>
                </div>

                <div class="toolbar">
                    <div class="toolbar-start">
                        <button class="playlist-anchor hidden" id="btn-playlist">
                            <div class="media-title">
                                <span class="title"></span>
                                <span class="show"></span>
                                <span class="episode"></span>
                                <span class="episode-title"></span>
                            </div>
                            <img src="assets/icons/playlist.svg" alt="Playlist" />
                            <div class="tooltip">
                                <span class="tooltip-text">Playlist</span>
                            </div>
                        </button>
                        <button id="btn-open-menu">
                            <img src="assets/icons/folder-open.svg" alt="Open folder" />
                            <div class="tooltip">
                                <span class="tooltip-text">Open</span>
                            </div>
                        </button>
                    </div>

                    <div class="toolbar-center">
                        <button id="btn-rewind">
                            <img src="assets/icons/rotate-left.svg" alt="Rewind" />
                            <div class="tooltip">
                                <span class="tooltip-text">Rewind</span>
                                <span class="shortcut">R</span>
                            </div>
                        </button>
                        <button id="btn-previous">
                            <img src="assets/icons/step-backward.svg" alt="Previous" />
                            <div class="tooltip">
                                <span class="tooltip-text">Previous</span>
                                <span class="shortcut">Ctrl + Left</span>
                            </div>
                        </button>
                        <button class="btn-seek" id="btn-seek-back">
                            <img src="assets/icons/seek-backward.svg" alt="Skip Backward" />
                            <div class="tooltip">
                                <span class="tooltip-text">Skip Backward</span>
                                <span class="shortcut">Left</span>
                            </div>
                        </button>
                        <button id="btn-play">
                            <img src="assets/icons/play.svg" alt="Play" />
                            <div class="tooltip">
                                <span class="tooltip-text">Play</span>
                                <span class="shortcut">Space</span>
                            </div>
                        </button>
                        <button class="btn-seek" id="btn-seek-forward">
                            <img src="assets/icons/seek-forward.svg" alt="Skip Forward" />
                            <div class="tooltip">
                                <span class="tooltip-text">Skip Forward</span>
                                <span class="shortcut">Right</span>
                            </div>
                        </button>
                        <button id="btn-next">
                            <img src="assets/icons/step-forward.svg" alt="Next" />
                            <div class="tooltip">
                                <span class="tooltip-text">Next</span>
                                <span class="shortcut">Ctrl + Right</span>
                            </div>
                        </button>
                        <button id="btn-autoplay">
                            <img src="assets/icons/arrow-right.svg" alt="Autoplay" />
                            <div class="tooltip">
                                <span class="tooltip-text">Autoplay</span>
                                <span class="shortcut">A</span>
                            </div>
                        </button>
                    </div>

                    <div class="toolbar-end">
                        <div id="volume-group">
                            <button id="btn-mute">
                                <img src="assets/icons/volume.svg" alt="Mute" />
                                <div class="tooltip">
                                    <span class="tooltip-text">Mute</span>
                                    <span class="shortcut">M</span>
                                </div>
                            </button>
                            <input
                                id="volume-slider"
                                type="range"
                                min="0"
                                max="150"
                                value="100"
                                step="2"
                            />
                            <div class="tooltip" id="volume-tooltip">
                                <span id="volume-display">100</span>
                                <span id="volume-percent">%</span>
                            </div>
                        </div>
                        <button id="btn-ambient" class="ambient-anchor">
                            <img src="assets/icons/bulb.svg" alt="Ambient" />
                            <div class="tooltip hidden">
                                <span class="tooltip-text">Ambient</span>
                                <span class="shortcut">B</span>
                            </div>
                        </button>
                        <button class="tracks-anchor" id="btn-tracks">
                            <img src="assets/icons/subtitles.svg" alt="Subtitles" />
                            <div class="tooltip hidden">
                                <span class="tooltip-text">Subtitles/Audio</span>
                            </div>
                        </button>
                        <button id="btn-panscan">
                            <img src="assets/icons/expand-alt.svg" alt="Pan-Scan" />
                            <div class="tooltip hidden">
                                <span class="tooltip-text">Pan-Scan</span>
                                <span class="shortcut">T</span>
                            </div>
                        </button>
                        <button id="btn-fullscreen">
                            <img src="assets/icons/expand.svg" alt="Fullscreen" />
                            <div class="tooltip hidden">
                                <span class="tooltip-text">Fullscreen</span>
                                <span class="shortcut">F</span>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="playlist-menu" class="menu hidden">
                    <div id="playlist-items"></div>
                </div>

                <div id="open-menu" class="menu hidden">
                    <div class="menu-item" data-action="open-file">
                        <span class="text">Open file…</span>
                        <span class="shortcut">Ctrl+O</span>
                        <img src="assets/icons/film.svg" alt="File icon" />
                    </div>
                    <div class="menu-item" data-action="open-folder">
                        <span class="text">Open folder…</span>
                        <span class="shortcut">Ctrl+Shift+O</span>
                        <img src="assets/icons/folder-open.svg" alt="Folder icon" />
                    </div>
                </div>

                <div id="ambient-menu" class="menu hidden">
                    <button id="ambient-toggle" class="menu-item">
                        <span>Ambient</span>
                        <span class="ambient-toggle">
                            <span class="ambient-toggle-knob"></span>
                        </span>
                    </button>
                    <div class="ambient-divider"></div>
                    <div class="ambient-sliders"></div>
                </div>

                <div id="tracks-menu" class="menu hidden">
                    <div class="tracks-heading">
                        <span>Subtitles</span>
                        <img src="assets/icons/subtitles.svg" alt="Subtitles" />
                    </div>
                    <div id="tracks-subtitle" class="tracks-list"></div>
                    <div class="tracks-divider"></div>
                    <div class="tracks-heading">
                        <span>Audio</span>
                        <img src="assets/icons/volume.svg" alt="Audio" />
                    </div>
                    <div id="tracks-audio" class="tracks-list"></div>
                </div>
            </div>
        </div>
    </body>
</html>
